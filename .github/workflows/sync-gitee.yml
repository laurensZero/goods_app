name: Build and Sync to Gitee

on:
  push:
    branches:
      - gh-pages
  workflow_run:
    workflows:
      - Publish Web Bundle to Pages
    types:
      - completed
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          if-no-files-found: error

  sync-gitee:
    needs: build
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all origin branches
        run: |
          git fetch origin "+refs/heads/*:refs/remotes/origin/*"
          git update-ref -d refs/remotes/origin/HEAD || true

      - name: Check gitee secrets
        id: check
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          if [ -n "${GITEE_USERNAME}" ] && [ -n "${GITEE_TOKEN}" ] && [ -n "${GITEE_REPO}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git identity
        if: steps.check.outputs.enabled == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.connectTimeout 30
          git config http.lowSpeedLimit 1000
          git config http.lowSpeedTime 60
          git config http.maxRequests 5
          git config http.postBuffer 524288000

      - name: Add gitee remote
        if: steps.check.outputs.enabled == 'true'
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          set -euo pipefail

          git remote remove gitee 2>/dev/null || true
          git remote add gitee "https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"

          for attempt in 1 2 3; do
            if git fetch gitee --prune; then
              echo "Fetch gitee succeeded on attempt ${attempt}"
              break
            fi

            if [ "${attempt}" -eq 3 ]; then
              echo "Fetch gitee failed after ${attempt} attempts" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 8))
            echo "Fetch gitee failed on attempt ${attempt}, retry in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done

      - name: Push matching ref to gitee
        if: steps.check.outputs.enabled == 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          refspec=""

          if [ "${EVENT_NAME}" = "push" ] && [ "${REF_TYPE}" = "branch" ]; then
            refspec="+refs/remotes/origin/${REF_NAME}:refs/heads/${REF_NAME}"
          elif [ "${EVENT_NAME}" = "workflow_run" ]; then
            refspec="+refs/remotes/origin/gh-pages:refs/heads/gh-pages"
          else
            echo "No matching ref sync rule for event ${EVENT_NAME}, skip."
            exit 0
          fi

          for attempt in 1 2 3 4; do
            if git push gitee "${refspec}"; then
              echo "Push to gitee succeeded on attempt ${attempt}"
              break
            fi

            if [ "${attempt}" -eq 4 ]; then
              echo "Push to gitee failed after ${attempt} attempts" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 10))
            echo "Push to gitee failed on attempt ${attempt}, retry in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          done

      - name: Missing gitee secrets
        if: steps.check.outputs.enabled != 'true'
        run: |
          echo "Skip gitee sync because required secrets are missing."
          echo "Required: GITEE_USERNAME, GITEE_TOKEN, GITEE_REPO"
