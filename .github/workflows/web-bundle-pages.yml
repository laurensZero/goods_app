name: Publish Web Bundle to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      channel:
        description: 发布通道
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta
      bundle_version:
        description: 资源版本（可选，不填自动生成 YYYYMMDD.runNumber）
        required: false
        default: ""
        type: string
      min_native_version:
        description: 最低原生版本（可选，如 1.3.0）
        required: false
        default: ""
        type: string
      notes:
        description: 更新说明（可选）
        required: false
        default: ""
        type: string
      rollback_version:
        description: 回档版本（可选，填写后将回档到该版本，不重新打包）
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build web assets
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.rollback_version == '' }}
        run: npm run build

      - name: Checkout gh-pages history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: ghpages

      - name: Package manifest and history
        id: package
        env:
          INPUT_VERSION: ${{ github.event.inputs.bundle_version || '' }}
          INPUT_MIN_NATIVE: ${{ github.event.inputs.min_native_version || '' }}
          INPUT_NOTES: ${{ github.event.inputs.notes || '' }}
          INPUT_ROLLBACK_VERSION: ${{ github.event.inputs.rollback_version || '' }}
          CHANNEL_INPUT: ${{ github.event.inputs.channel || '' }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "push" ]; then
            CHANNEL="beta"
          else
            CHANNEL="${CHANNEL_INPUT:-stable}"
          fi

          ROLLBACK_VERSION="${INPUT_ROLLBACK_VERSION// /}"

          mkdir -p "pages/${CHANNEL}"
          if [ -f "docs/ota-bundle-manager.html" ]; then
            cp "docs/ota-bundle-manager.html" "pages/index.html"
          fi

          HISTORY_FILE="pages/${CHANNEL}/versions.json"
          if [ -f "ghpages/${CHANNEL}/versions.json" ]; then
            cp "ghpages/${CHANNEL}/versions.json" "${HISTORY_FILE}"
          fi

          DATE_TAG=$(date -u +%Y%m%d)
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          else
            DAILY_SEQ=$(python3 - <<'PY'
import json
import os
import re

history_file = os.environ.get('HISTORY_FILE', '').strip()
date_tag = os.environ.get('DATE_TAG', '').strip()
pattern = re.compile(rf'^{re.escape(date_tag)}\.(\d+)$')
max_seq = 0

if history_file and os.path.exists(history_file):
    try:
        with open(history_file, 'r', encoding='utf-8') as f:
            items = json.load(f)
        if not isinstance(items, list):
            items = []
    except Exception:
        items = []
else:
    items = []

for item in items:
    version = str((item or {}).get('version', '')).strip()
    match = pattern.match(version)
    if match:
        max_seq = max(max_seq, int(match.group(1)))

print(max_seq + 1)
PY
)
            VERSION="${DATE_TAG}.${DAILY_SEQ}"
          fi

          OWNER_LOWER=$(printf '%s' "${OWNER}" | tr '[:upper:]' '[:lower:]')
          PUBLISHED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          URL=""
          HASH=""
          BUNDLE_NAME="(existing)"
          MODE="rollback"
          if [ -z "${ROLLBACK_VERSION}" ]; then
            MODE="publish"
            BUNDLE_NAME="bundle-${VERSION}.zip"
            cd dist
            zip -r "../pages/${CHANNEL}/${BUNDLE_NAME}" .
            cd ..
            HASH=$(sha256sum "pages/${CHANNEL}/${BUNDLE_NAME}" | awk '{print $1}')
            URL="${BUNDLE_NAME}"
          fi

          export HISTORY_FILE ROLLBACK_VERSION VERSION URL HASH INPUT_MIN_NATIVE INPUT_NOTES PUBLISHED_AT CHANNEL BUNDLE_NAME MODE
            python3 scripts/prepare_pages_manifest.py >> "$GITHUB_OUTPUT"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./pages
          keep_files: true

      - name: Summary
        run: |
          echo "Mode: ${{ steps.package.outputs.mode }}"
          echo "Channel: ${{ steps.package.outputs.channel }}"
          echo "Version: ${{ steps.package.outputs.version }}"
          echo "Bundle: ${{ steps.package.outputs.bundle }}"
          echo "URL: ${{ steps.package.outputs.url }}"
