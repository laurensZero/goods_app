name: Publish Web Bundle to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      channel:
        description: 发布通道
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta
      bundle_version:
        description: 资源版本（可选，不填自动生成 YYYYMMDD.N）
        required: false
        default: ""
        type: string
      min_native_version:
        description: 最低原生版本（可选，如 1.3.0）
        required: false
        default: ""
        type: string
      notes:
        description: 更新说明（可选）
        required: false
        default: ""
        type: string
      update_level:
        description: 更新级别（force/prompt/silent）
        required: false
        default: prompt
        type: choice
        options:
          - prompt
          - force
          - silent
      rollback_version:
        description: 回档版本（可选，填写后将回档到该版本，不重新打包）
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Validate Secret
        run: |
          if [ -z "${{ secrets.VITE_GITHUB_OAUTH_CLIENT_ID }}" ]; then
            echo "Error: VITE_GITHUB_OAUTH_CLIENT_ID is not set."
            exit 1
          fi
          echo "VITE_GITHUB_OAUTH_CLIENT_ID=${{ secrets.VITE_GITHUB_OAUTH_CLIENT_ID }}" >> .env.production

      - name: Build web assets
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.rollback_version == '' }}
        run: npm run build

      - name: Checkout gh-pages history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: ghpages

      - name: Package manifest and history
        id: package
        env:
          INPUT_VERSION: ${{ github.event.inputs.bundle_version || '' }}
          INPUT_MIN_NATIVE: ${{ github.event.inputs.min_native_version || '' }}
          INPUT_NOTES: ${{ github.event.inputs.notes || '' }}
          INPUT_UPDATE_LEVEL: ${{ github.event.inputs.update_level || '' }}
          INPUT_ROLLBACK_VERSION: ${{ github.event.inputs.rollback_version || '' }}
          CHANNEL_INPUT: ${{ github.event.inputs.channel || '' }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE_SHA: ${{ github.event.before || '' }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          generate_beta_notes() {
            local range_from=""
            local range_to="${GITHUB_SHA}"

            if [ "${EVENT_NAME}" = "push" ] && [ -n "${EVENT_BEFORE_SHA}" ] && [ "${EVENT_BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
              range_from="${EVENT_BEFORE_SHA}"
            else
              range_from="$(git rev-parse HEAD^ 2>/dev/null || true)"
            fi

            if [ -z "${range_from}" ]; then
              range_from="${range_to}"
            fi

            local range="${range_from}..${range_to}"
            local has_notes=0
            local notes_file
            notes_file="$(mktemp)"

            for commit in $(git rev-list --reverse "${range}" 2>/dev/null || true); do
              local title title_lower files body
              title="$(git log -1 --format=%s "${commit}")"
              title_lower="$(printf '%s' "${title}" | tr '[:upper:]' '[:lower:]')"

              if [[ "${title_lower}" == merge\ * ]]; then
                continue
              fi

              if [[ "${title_lower}" == chore:* || "${title_lower}" == "chore "* || "${title_lower}" == chore\(* ]]; then
                continue
              fi

              files="$(git diff-tree --no-commit-id --name-only -r "${commit}")"
              if [ -z "${files}" ]; then
                continue
              fi

              if ! printf '%s\n' "${files}" | grep -qvE '^\.github/workflows/'; then
                continue
              fi

              printf '%s\n' "- ${title}" >> "${notes_file}"
              body="$(git log -1 --format=%b "${commit}")"
              if [ -n "${body}" ]; then
                while IFS= read -r line || [ -n "${line}" ]; do
                  if [ -n "${line}" ]; then
                    printf '  %s\n' "${line}" >> "${notes_file}"
                  else
                    printf '\n' >> "${notes_file}"
                  fi
                done <<< "${body}"
              fi
              printf '\n' >> "${notes_file}"
              has_notes=1
            done

            if [ "${has_notes}" -eq 0 ]; then
              printf '%s\n' "- 本次 beta 更新无可用变更说明" >> "${notes_file}"
            fi

            cat "${notes_file}"
            rm -f "${notes_file}"
          }

          if [ "${EVENT_NAME}" = "push" ]; then
            CHANNEL="beta"
          else
            CHANNEL="${CHANNEL_INPUT:-stable}"
          fi

          ROLLBACK_VERSION="${INPUT_ROLLBACK_VERSION// /}"

          mkdir -p pages
          if [ -d "ghpages" ]; then
            cp -a "ghpages/." pages/
            rm -rf "pages/.git"
          fi

          mkdir -p "pages/${CHANNEL}"
          if [ -f "docs/ota-bundle-manager.html" ]; then
            cp "docs/ota-bundle-manager.html" "pages/index.html"
          fi
          # Copy share landing page to gh-pages
          if [ -f "docs/share.html" ]; then
            cp "docs/share.html" "pages/share.html"
          fi

          HISTORY_FILE="pages/${CHANNEL}/versions.json"
          if [ -f "ghpages/${CHANNEL}/versions.json" ]; then
            cp "ghpages/${CHANNEL}/versions.json" "${HISTORY_FILE}"
          fi

          if [ "${CHANNEL}" = "beta" ] && [ -z "${ROLLBACK_VERSION}" ]; then
            GENERATED_NOTES="$(generate_beta_notes)"
            if [ -n "${GENERATED_NOTES}" ]; then
              INPUT_NOTES="${GENERATED_NOTES}"
            fi
          fi

          DATE_TAG=$(TZ=Asia/Shanghai date +%Y%m%d)
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          else
            DAILY_SEQ=$(python3 scripts/next_bundle_daily_seq.py "${HISTORY_FILE}" "${DATE_TAG}")
            VERSION="${DATE_TAG}.${DAILY_SEQ}"
          fi

          OWNER_LOWER=$(printf '%s' "${OWNER}" | tr '[:upper:]' '[:lower:]')
          PUBLISHED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          URL=""
          HASH=""
          BUNDLE_NAME="(existing)"
          MODE="rollback"
          if [ -z "${ROLLBACK_VERSION}" ]; then
            MODE="publish"
            BUNDLE_NAME="bundle-${VERSION}.zip"
            cd dist
            zip -r "../pages/${CHANNEL}/${BUNDLE_NAME}" .
            cd ..
            HASH=$(sha256sum "pages/${CHANNEL}/${BUNDLE_NAME}" | awk '{print $1}')
            URL="${BUNDLE_NAME}"
          fi

          export HISTORY_FILE ROLLBACK_VERSION VERSION URL HASH INPUT_MIN_NATIVE INPUT_NOTES PUBLISHED_AT CHANNEL BUNDLE_NAME MODE
          python3 scripts/prepare_pages_manifest.py >> "$GITHUB_OUTPUT"

          # Remove stale bundle artifacts that are no longer referenced by versions.json.
          # This keeps gh-pages from growing indefinitely.
          python3 scripts/prune_pages_bundles.py pages

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./pages
          keep_files: false

      - name: Summary
        run: |
          echo "Mode: ${{ steps.package.outputs.mode }}"
          echo "Channel: ${{ steps.package.outputs.channel }}"
          echo "Version: ${{ steps.package.outputs.version }}"
          echo "Bundle: ${{ steps.package.outputs.bundle }}"
          echo "URL: ${{ steps.package.outputs.url }}"
