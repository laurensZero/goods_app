name: Build Android APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        required: true
        default: debug
        type: choice
        options:
          - debug
      release_tag:
        description: Release tag for manual release builds, for example v1.0.0
        required: false
        type: string

jobs:
  build-debug:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'debug'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Install dependencies
        run: npm ci

      - name: Build web assets and sync Android project
        run: npm run build:android

      - name: Prepare Gradle wrapper
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: goods-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  build-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Configure Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "Missing secret: ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Missing secret: ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Missing secret: ANDROID_KEY_ALIAS"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Missing secret: ANDROID_KEY_PASSWORD"; exit 1; }

      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Determine release tag
        id: release_meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION_NAME="$TAG"
          VERSION_NAME="${VERSION_NAME#v}"
          VERSION_NAME="${VERSION_NAME#V}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "asset_name=goods-app-$TAG-release.apk" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets and sync Android project
        env:
          VITE_APP_VERSION: ${{ steps.release_meta.outputs.version_name }}
          VITE_ANDROID_VERSION_NAME: ${{ steps.release_meta.outputs.version_name }}
        run: npm run build:android

      - name: Prepare Gradle wrapper
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_NAME: ${{ steps.release_meta.outputs.version_name }}
        run: ./gradlew assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: goods-app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Generate release notes from commits
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -Fxv "$RELEASE_TAG" | head -n 1 || true)

          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="$PREVIOUS_TAG..$GITHUB_SHA"
          else
            RANGE="$GITHUB_SHA"
          fi

          echo "## 更新说明" > release-notes.md
          echo "" >> release-notes.md

          HAS_NOTES=0
          for COMMIT in $(git rev-list --reverse "$RANGE"); do
            TITLE=$(git log -1 --format=%s "$COMMIT")
            TITLE_LOWER=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]')

            if [[ "$TITLE_LOWER" == merge\ * ]]; then
              continue
            fi

            if [[ "$TITLE_LOWER" == chore:* || "$TITLE_LOWER" == "chore "* || "$TITLE_LOWER" == chore\(* ]]; then
              continue
            fi

            FILES=$(git diff-tree --no-commit-id --name-only -r "$COMMIT")
            if [ -z "$FILES" ]; then
              continue
            fi

            if ! echo "$FILES" | grep -qvE '^\.github/workflows/'; then
              continue
            fi

            echo "- $TITLE" >> release-notes.md
            BODY=$(git log -1 --format=%b "$COMMIT")
            if [ -n "$BODY" ]; then
              while IFS= read -r LINE || [ -n "$LINE" ]; do
                if [ -n "$LINE" ]; then
                  echo "  $LINE" >> release-notes.md
                else
                  echo "" >> release-notes.md
                fi
              done <<< "$BODY"
            fi
            echo "" >> release-notes.md
            HAS_NOTES=1
          done

          if [ "$HAS_NOTES" -eq 0 ]; then
            echo "- 本次更新无可用变更说明" >> release-notes.md
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file release-notes.md --target "$GITHUB_SHA"
          fi

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_ASSET_NAME: ${{ steps.release_meta.outputs.asset_name }}
        run: |
          gh release upload "$RELEASE_TAG" "android/app/build/outputs/apk/release/app-release.apk#$RELEASE_ASSET_NAME" --clobber
