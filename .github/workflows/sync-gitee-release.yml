name: Sync GitHub Release to Gitee Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: 需要同步的 tag（例如 v1.2.3）
        required: true
        type: string

jobs:
  sync-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        id: check
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          OWNER=""
          REPO=""

          if [ -n "${GITEE_OWNER}" ] && [ -n "${GITEE_REPO}" ]; then
            OWNER="${GITEE_OWNER}"
            REPO="${GITEE_REPO}"
            if echo "${REPO}" | grep -q '/'; then
              OWNER="${REPO%%/*}"
              REPO="${REPO##*/}"
            fi
          elif [ -n "${GITEE_REPO}" ] && echo "${GITEE_REPO}" | grep -q '/'; then
            OWNER="${GITEE_REPO%%/*}"
            REPO="${GITEE_REPO##*/}"
          elif [ -n "${GITEE_USERNAME}" ] && [ -n "${GITEE_REPO}" ]; then
            OWNER="${GITEE_USERNAME}"
            REPO="${GITEE_REPO}"
          fi

          if [ -n "${GITEE_TOKEN}" ] && [ -n "${OWNER}" ] && [ -n "${REPO}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"
            echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release payload
        if: steps.check.outputs.enabled == 'true'
        id: payload
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          TAG="${EVENT_TAG}"
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG}"
          fi

          if [ -z "${TAG}" ]; then
            echo "tag 为空，无法同步 release" >&2
            exit 1
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GH_REPO}/releases/tags/${TAG}" \
            -o gh-release.json

          NAME=$(jq -r '.name // .tag_name' gh-release.json)
          BODY=$(jq -r '.body // ""' gh-release.json)
          TARGET_COMMITISH=$(jq -r '.target_commitish // .tag_name // ""' gh-release.json)
          if [ -z "${TARGET_COMMITISH}" ] || [ "${TARGET_COMMITISH}" = "null" ]; then
            TARGET_COMMITISH="${TAG}"
          fi

          {
            echo "tag=${TAG}"
            echo "target_commitish=${TARGET_COMMITISH}"
            echo "name<<EOF"
            echo "${NAME}"
            echo "EOF"
            echo "body<<EOF"
            echo "${BODY}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout tags
        if: steps.check.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure gitee tag exists
        if: steps.check.outputs.enabled == 'true'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_OWNER: ${{ steps.check.outputs.owner }}
          GITEE_REPO: ${{ steps.check.outputs.repo }}
          TAG: ${{ steps.payload.outputs.tag }}
        run: |
          set -euo pipefail

          PUSH_USER="${GITEE_USERNAME}"
          if [ -z "${PUSH_USER}" ]; then
            PUSH_USER="${GITEE_OWNER}"
          fi

          git remote remove gitee 2>/dev/null || true
          git remote add gitee "https://${PUSH_USER}:${GITEE_TOKEN}@gitee.com/${GITEE_OWNER}/${GITEE_REPO}.git"

          if git ls-remote --tags gitee "refs/tags/${TAG}" | grep -q "refs/tags/${TAG}"; then
            echo "Tag ${TAG} already exists in gitee"
          else
            git push gitee "+refs/tags/${TAG}:refs/tags/${TAG}"
          fi

      - name: Create or get gitee release
        if: steps.check.outputs.enabled == 'true'
        id: gitee_release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ steps.check.outputs.owner }}
          GITEE_REPO: ${{ steps.check.outputs.repo }}
          TAG: ${{ steps.payload.outputs.tag }}
          TARGET_COMMITISH: ${{ steps.payload.outputs.target_commitish }}
          NAME: ${{ steps.payload.outputs.name }}
          BODY: ${{ steps.payload.outputs.body }}
        run: |
          set -euo pipefail

          API="https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}"

          STATUS=$(curl -s -o gitee-release.json -w "%{http_code}" \
            "${API}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}")
          echo "Get release by tag status: ${STATUS}"

          RELEASE_ID=""
          if [ "${STATUS}" = "200" ]; then
            RELEASE_ID=$(jq -r '.id // .release.id // empty' gitee-release.json)
          fi

          if [ -z "${RELEASE_ID}" ] || [ "${RELEASE_ID}" = "null" ]; then
            CREATE_STATUS=$(curl -s -o gitee-release.json -w "%{http_code}" -X POST "${API}/releases" \
              --data-urlencode "access_token=${GITEE_TOKEN}" \
              --data-urlencode "tag_name=${TAG}" \
              --data-urlencode "target_commitish=${TARGET_COMMITISH}" \
              --data-urlencode "name=${NAME}" \
              --data-urlencode "body=${BODY}")
            echo "Create release status: ${CREATE_STATUS}"
            RELEASE_ID=$(jq -r '.id // .release.id // empty' gitee-release.json)
          fi

          if [ -z "${RELEASE_ID}" ] || [ "${RELEASE_ID}" = "null" ]; then
            LIST_STATUS=$(curl -s -o gitee-releases-list.json -w "%{http_code}" "${API}/releases?access_token=${GITEE_TOKEN}&page=1&per_page=100" || true)
            echo "List releases status: ${LIST_STATUS}"
            RELEASE_ID=$(jq -r --arg TAG "${TAG}" 'map(select((.tag_name // "") == $TAG)) | .[0].id // empty' gitee-releases-list.json 2>/dev/null || true)
          fi

          if [ -z "${RELEASE_ID}" ] || [ "${RELEASE_ID}" = "null" ]; then
            echo "创建或读取 Gitee Release 失败（owner=${GITEE_OWNER}, repo=${GITEE_REPO}, tag=${TAG}）。" >&2
            echo "gitee-release.json:" >&2
            cat gitee-release.json >&2 || true
            if [ -f gitee-releases-list.json ]; then
              echo "gitee-releases-list.json (first 20 lines):" >&2
              head -n 20 gitee-releases-list.json >&2 || true
            fi
            exit 1
          fi

          echo "id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"

      - name: Download GitHub assets
        if: steps.check.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p gitee-assets

          jq -r '.assets[]?.browser_download_url // empty' gh-release.json | while read -r URL; do
            [ -n "${URL}" ] || continue
            FILE_NAME="$(basename "${URL}")"
            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/octet-stream" \
              "${URL}" -o "gitee-assets/${FILE_NAME}"
          done

      - name: Upload assets to gitee release
        if: steps.check.outputs.enabled == 'true'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ steps.check.outputs.owner }}
          GITEE_REPO: ${{ steps.check.outputs.repo }}
          RELEASE_ID: ${{ steps.gitee_release.outputs.id }}
        run: |
          set -euo pipefail
          API="https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}"

          shopt -s nullglob
          FILES=(gitee-assets/*)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No release assets found, skip upload."
            exit 0
          fi

          for FILE in "${FILES[@]}"; do
            echo "Uploading $(basename "${FILE}") to gitee release ${RELEASE_ID}"
            curl -fsSL -X POST "${API}/releases/${RELEASE_ID}/attach_files" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${FILE}" \
              -o /tmp/gitee-upload.json
          done

      - name: Missing secrets
        if: steps.check.outputs.enabled != 'true'
        run: |
          echo "Skip gitee release sync because required secrets are missing."
          echo "Required: GITEE_TOKEN + (GITEE_OWNER,GITEE_REPO) or GITEE_REPO=owner/repo or (GITEE_USERNAME,GITEE_REPO)"
