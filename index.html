<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- 移动端 viewport：禁止用户缩放，模拟 App 体验 -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f0f10" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <title>谷子收纳</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />
    <script>
      (function() {
        try {
          var appearance = localStorage.getItem('goods_theme_appearance');
          var isDark = appearance === '"dark"' || appearance === 'dark' || (appearance !== '"light"' && appearance !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('theme-dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app">
      <style>
        html, body {
          margin: 0;
          padding: 0;
          width: 100%;
          height: 100%;
          overflow: hidden;
          scrollbar-width: none;
        }
        html::-webkit-scrollbar, body::-webkit-scrollbar {
          display: none;
        }
        .app-splash-screen {
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background-color: #f5f5f7;
          background-image: linear-gradient(180deg, #efeff2 0%, #e7e7eb 100%);
          z-index: 99999;
        }
        html.theme-dark .app-splash-screen {
          background-color: #0f0f10;
          background-image: linear-gradient(180deg, #0f0f10 0%, #141417 100%);
        }
        .app-splash-logo {
          width: 104px;
          height: 104px;
          border-radius: 26px;
          box-shadow: 0 16px 32px rgba(0, 0, 0, 0.08);
          animation: app-splash-pulse 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        html.theme-dark .app-splash-logo {
          box-shadow: 0 16px 32px rgba(0, 0, 0, 0.3);
        }
        @keyframes app-splash-pulse {
          0%, 100% {
            opacity: 0.9;
            transform: scale(0.96);
          }
          50% {
            opacity: 1;
            transform: scale(1);
          }
        }
      </style>
      <div class="app-splash-screen">
        <img class="app-splash-logo" src="/favicon.svg" alt="Loading..." />
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
