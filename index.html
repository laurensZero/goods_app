<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>OTA Bundle 管理台</title>
  <style>
    :root {
      --app-bg: #f5f7fb;
      --app-surface: #ffffff;
      --app-surface-soft: #f0f3fa;
      --app-text: #1e2430;
      --app-text-secondary: #5b6679;
      --app-text-tertiary: #8a94a6;
      --app-border: rgba(30, 36, 48, 0.1);
      --app-primary: #3c7bff;
      --app-shadow: 0 12px 30px rgba(26, 40, 75, 0.08);
      --radius-card: 18px;
      --radius-large: 24px;
      --page-padding: clamp(16px, 3vw, 26px);
      --section-gap: 18px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --app-bg: #0e121a;
        --app-surface: #171c27;
        --app-surface-soft: #20283a;
        --app-text: #edf2ff;
        --app-text-secondary: #b7c0d5;
        --app-text-tertiary: #8a96b3;
        --app-border: rgba(237, 242, 255, 0.12);
        --app-primary: #77a5ff;
        --app-shadow: 0 16px 34px rgba(0, 0, 0, 0.34);
      }
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at right top, rgba(60, 123, 255, 0.12), transparent 40%), var(--app-bg);
      color: var(--app-text);
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px var(--page-padding) 40px;
    }

    .hero {
      background: var(--app-surface);
      border: 1px solid var(--app-border);
      border-radius: var(--radius-large);
      padding: 22px;
      box-shadow: var(--app-shadow);
    }

    .hero-kicker {
      margin: 0;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--app-text-tertiary);
    }

    .hero-title {
      margin: 8px 0 0;
      font-size: clamp(24px, 5vw, 34px);
      letter-spacing: -0.03em;
    }

    .hero-desc {
      margin: 10px 0 0;
      color: var(--app-text-secondary);
      line-height: 1.6;
      font-size: 14px;
    }

    .hero-row {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--app-surface-soft);
      color: var(--app-text-secondary);
      font-size: 12px;
      border: 1px solid var(--app-border);
    }

    .btn {
      border: 1px solid var(--app-border);
      background: var(--app-surface-soft);
      color: var(--app-text);
      border-radius: 12px;
      min-height: 38px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }

    .btn:disabled { opacity: .55; cursor: not-allowed; }

    .section {
      margin-top: var(--section-gap);
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .card {
      background: var(--app-surface);
      border: 1px solid var(--app-border);
      border-radius: var(--radius-card);
      padding: 16px;
      box-shadow: var(--app-shadow);
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 280px;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .card-kicker {
      margin: 0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--app-text-tertiary);
    }

    .card-title {
      margin: 4px 0 0;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .state {
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      border: 1px solid var(--app-border);
      background: var(--app-surface-soft);
      color: var(--app-text-secondary);
    }

    .state--ok { color: #22a161; border-color: rgba(34, 161, 97, 0.35); }
    .state--warn { color: #ce7c12; border-color: rgba(206, 124, 18, 0.35); }
    .state--error { color: #c74444; border-color: rgba(199, 68, 68, 0.35); }

    .meta {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 8px 10px;
      font-size: 13px;
      line-height: 1.5;
    }

    .meta dt { color: var(--app-text-tertiary); }
    .meta dd { margin: 0; color: var(--app-text); word-break: break-all; }

    .meta a {
      color: var(--app-primary);
      text-decoration: none;
    }

    .meta a:hover { text-decoration: underline; }

    .actions {
      margin-top: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .history {
      margin-top: 2px;
      display: grid;
      gap: 8px;
    }

    .history-item {
      border: 1px solid var(--app-border);
      border-radius: 10px;
      background: var(--app-surface-soft);
      padding: 8px 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--app-text-secondary);
    }

    .history-main {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .history-version {
      color: var(--app-text);
      font-weight: 600;
      word-break: break-all;
    }

    .history-time {
      color: var(--app-text-tertiary);
    }

    .tip {
      margin-top: 8px;
      font-size: 12px;
      color: var(--app-text-tertiary);
    }

    .publish-card {
      background: var(--app-surface);
      border: 1px solid var(--app-border);
      border-radius: var(--radius-card);
      padding: 16px;
      box-shadow: var(--app-shadow);
      display: grid;
      gap: 12px;
    }

    .publish-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field-label {
      font-size: 12px;
      color: var(--app-text-tertiary);
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      min-height: 38px;
      border-radius: 10px;
      border: 1px solid var(--app-border);
      background: var(--app-surface-soft);
      color: var(--app-text);
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
    }

    .textarea {
      min-height: 78px;
      resize: vertical;
    }

    .publish-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .publish-status {
      margin: 0;
      font-size: 13px;
      color: var(--app-text-secondary);
      line-height: 1.5;
      word-break: break-word;
    }

    .publish-status--error {
      color: #c74444;
    }

    .publish-status--ok {
      color: #22a161;
    }

    .quick-nav {
      position: fixed;
      left: clamp(8px, 2vw, 18px);
      top: 120px;
      z-index: 20;
      width: 170px;
      background: color-mix(in srgb, var(--app-surface) 88%, transparent);
      border: 1px solid var(--app-border);
      border-radius: 14px;
      padding: 10px;
      box-shadow: var(--app-shadow);
      display: grid;
      gap: 6px;
      backdrop-filter: blur(6px);
    }

    .top-nav {
      position: sticky;
      top: 10px;
      z-index: 25;
      display: none;
      gap: 8px;
      margin-top: 12px;
      padding: 10px;
      border: 1px solid var(--app-border);
      border-radius: 12px;
      background: color-mix(in srgb, var(--app-surface) 90%, transparent);
      box-shadow: var(--app-shadow);
      overflow-x: auto;
      white-space: nowrap;
      backdrop-filter: blur(6px);
    }

    .quick-nav-title {
      margin: 0 0 4px;
      font-size: 11px;
      color: var(--app-text-tertiary);
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 0 4px;
    }

    .quick-nav-btn {
      border: 1px solid var(--app-border);
      background: var(--app-surface-soft);
      color: var(--app-text-secondary);
      border-radius: 10px;
      min-height: 34px;
      padding: 0 10px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .top-nav-btn {
      border: 1px solid var(--app-border);
      background: var(--app-surface-soft);
      color: var(--app-text-secondary);
      border-radius: 999px;
      min-height: 32px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .top-nav-btn.active {
      color: var(--app-primary);
      border-color: color-mix(in srgb, var(--app-primary) 45%, var(--app-border));
      background: color-mix(in srgb, var(--app-primary) 10%, var(--app-surface-soft));
    }

    .focus-toggle {
      border-style: dashed;
    }

    .section--collapsed {
      display: none;
    }

    .quick-nav-btn:hover {
      color: var(--app-text);
    }

    .quick-nav-btn.active {
      color: var(--app-primary);
      border-color: color-mix(in srgb, var(--app-primary) 45%, var(--app-border));
      background: color-mix(in srgb, var(--app-primary) 10%, var(--app-surface-soft));
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      color: var(--app-text-secondary);
      font-size: 13px;
    }

    .checkbox-row input[type='checkbox'] {
      width: 16px;
      height: 16px;
      accent-color: var(--app-primary);
    }

    @media (min-width: 860px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: stretch;
      }

      .publish-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field--full {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 1320px) {
      .quick-nav {
        display: none;
      }

      .top-nav {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="hero-kicker">OTA Bundle Dashboard</p>
      <h1 class="hero-title">Goods App OTA Bundle 管理台</h1>
      <p class="hero-desc">用于查看 GitHub Pages 上 stable 与 beta 通道的 manifest 与 bundle 资源状态。可快速核对版本、哈希、最小原生版本与下载链接。</p>
      <div class="hero-row">
        <span class="chip" id="baseUrlChip">Base: ./</span>
        <span class="chip" id="updatedAtChip">最近刷新：--</span>
        <button class="btn" id="refreshAllBtn" type="button">刷新全部</button>
      </div>
    </section>

    <aside class="quick-nav" aria-label="区域快速切换">
      <p class="quick-nav-title">快速切换</p>
      <button class="quick-nav-btn" type="button" data-nav-target="authSection">认证信息</button>
      <button class="quick-nav-btn" type="button" data-nav-target="channelSection">发布通道</button>
      <button class="quick-nav-btn" type="button" data-nav-target="publishSection">发布操作</button>
      <button class="quick-nav-btn" type="button" data-nav-target="announcementSection">公告发布</button>
      <button class="quick-nav-btn" type="button" data-nav-target="giteeSection">Gitee 同步</button>
      <button class="quick-nav-btn focus-toggle" id="showAllSectionsBtn" type="button">显示全部区域</button>
    </aside>

    <div class="top-nav" aria-label="移动端快速切换">
      <button class="top-nav-btn" type="button" data-nav-target-mobile="authSection">认证</button>
      <button class="top-nav-btn" type="button" data-nav-target-mobile="channelSection">通道</button>
      <button class="top-nav-btn" type="button" data-nav-target-mobile="publishSection">发布</button>
      <button class="top-nav-btn" type="button" data-nav-target-mobile="announcementSection">公告</button>
      <button class="top-nav-btn" type="button" data-nav-target-mobile="giteeSection">Gitee</button>
      <button class="top-nav-btn focus-toggle" id="showAllSectionsMobileBtn" type="button">全部</button>
    </div>

    <section class="section" id="authSection">
      <h2 class="section-title">认证信息</h2>
      <article class="publish-card">
        <div class="publish-grid">
          <label class="field field--full">
            <span class="field-label">GitHub Token（公告发布需要 gist；工作流触发需要 repo/workflow）</span>
            <input id="publishToken" class="input" type="password" placeholder="ghp_xxx / github_pat_xxx" autocomplete="off" />
          </label>
        </div>
        <div class="publish-actions">
          <button class="btn" id="saveTokenBtn" type="button">保存 Token</button>
          <button class="btn" id="copyTokenBtn" type="button">复制 Token</button>
          <button class="btn" id="clearTokenBtn" type="button">一键清除</button>
        </div>
      </article>
    </section>

    <section class="section" id="channelSection">
      <h2 class="section-title">发布通道</h2>
      <div class="grid" id="channelGrid"></div>
      <p class="tip">提示：你可以直接在下方发布面板触发 workflow_dispatch，或点击 Actions 页面手动发布。</p>
    </section>

    <section class="section" id="publishSection">
      <h2 class="section-title">发布操作</h2>
      <article class="publish-card">
        <div class="publish-grid">
          <label class="field">
            <span class="field-label">发布通道</span>
            <select id="publishChannel" class="select">
              <option value="stable">stable</option>
              <option value="beta">beta</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">资源版本（可选）</span>
            <input id="publishVersion" class="input" type="text" placeholder="留空=自动 YYYYMMDD.N" />
          </label>

          <label class="field">
            <span class="field-label">最低原生版本（可选）</span>
            <input id="publishMinNative" class="input" type="text" placeholder="例如 1.3.1" />
          </label>

          <label class="field field--full">
            <span class="field-label">更新说明（可选）</span>
            <textarea id="publishNotes" class="textarea" placeholder="例如：修复 OTA 激活时机与恢复入口"></textarea>
          </label>

        </div>

        <div class="publish-actions">
          <button class="btn" id="publishBtn" type="button">触发发布</button>
          <button class="btn" id="openActionsBtn" type="button">打开 Actions 页面</button>
        </div>
        <p id="publishStatus" class="publish-status">等待操作</p>
      </article>
    </section>

    <section class="section" id="announcementSection">
      <h2 class="section-title">公告编辑与发布（Gist）</h2>
      <article class="publish-card">
        <div class="publish-grid">
          <label class="field field--full">
            <span class="field-label">公告 Gist 链接（支持 gist 页面链接或 raw 链接）</span>
            <input id="announcementGistUrl" class="input" type="text" placeholder="https://gist.github.com/<user>/<gist_id>" />
          </label>

          <label class="field">
            <span class="field-label">公告 ID</span>
            <input id="announcementId" class="input" type="text" placeholder="例如 notice-20260327-1" />
          </label>

          <label class="field">
            <span class="field-label">优先级</span>
            <input id="announcementPriority" class="input" type="number" value="100" min="0" step="1" />
          </label>

          <label class="field field--full">
            <span class="field-label">标题</span>
            <input id="announcementTitle" class="input" type="text" placeholder="公告标题" />
          </label>

          <label class="field field--full">
            <span class="field-label">正文</span>
            <textarea id="announcementMessage" class="textarea" placeholder="公告正文，支持换行"></textarea>
          </label>

          <label class="field">
            <span class="field-label">展示模式</span>
            <select id="announcementShowMode" class="select">
              <option value="once">once（仅一次）</option>
              <option value="daily">daily（每天一次）</option>
              <option value="per_version">per_version（每版本一次）</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">渠道（逗号分隔）</span>
            <input id="announcementChannels" class="input" type="text" value="stable,beta" />
          </label>

          <label class="field">
            <span class="field-label">开始时间（ISO，可留空）</span>
            <input id="announcementStartAt" class="input" type="text" placeholder="2026-03-27T00:00:00Z" />
          </label>

          <label class="field">
            <span class="field-label">结束时间（ISO，可留空）</span>
            <input id="announcementEndAt" class="input" type="text" placeholder="2026-04-30T23:59:59Z" />
          </label>

          <label class="field">
            <span class="field-label">最低 App 版本（可留空）</span>
            <input id="announcementMinVersion" class="input" type="text" placeholder="例如 1.3.2" />
          </label>

          <label class="field">
            <span class="field-label">最高 App 版本（可留空）</span>
            <input id="announcementMaxVersion" class="input" type="text" placeholder="例如 2.0.0" />
          </label>

          <label class="field">
            <span class="field-label">按钮文案（可留空）</span>
            <input id="announcementCtaText" class="input" type="text" placeholder="例如 查看详情" />
          </label>

          <label class="field">
            <span class="field-label">按钮链接（https，可留空）</span>
            <input id="announcementCtaUrl" class="input" type="text" placeholder="https://example.com" />
          </label>

          <label class="field field--full">
            <span class="field-label">开关</span>
            <div class="checkbox-row">
              <input id="announcementEnabled" type="checkbox" checked />
              <label for="announcementEnabled">启用公告（enabled=true）</label>
            </div>
          </label>
        </div>

        <div class="publish-actions">
          <button class="btn" id="loadAnnouncementBtn" type="button">从 Gist 读取</button>
          <button class="btn" id="publishAnnouncementBtn" type="button">发布到 Gist</button>
          <button class="btn" id="openAnnouncementGistBtn" type="button">打开 Gist 页面</button>
        </div>
        <p id="announcementStatus" class="publish-status">等待操作</p>
      </article>
    </section>

    <section class="section" id="giteeSection">
      <h2 class="section-title">Gitee 同步操作</h2>
      <article class="publish-card">
        <div class="publish-grid">
          <label class="field">
            <span class="field-label">Release Tag（同步 Gitee Release 时使用）</span>
            <input id="giteeReleaseTag" class="input" type="text" placeholder="例如 v1.2.3" />
          </label>
        </div>

        <div class="publish-actions">
          <button class="btn" id="syncGiteeBtn" type="button">触发仓库同步</button>
          <button class="btn" id="openSyncGiteeBtn" type="button">打开仓库同步工作流</button>
        </div>

        <div class="publish-actions">
          <button class="btn" id="syncGiteeReleaseBtn" type="button">触发 Release 同步</button>
          <button class="btn" id="openSyncGiteeReleaseBtn" type="button">打开 Release 同步工作流</button>
        </div>

        <p id="giteeWorkflowStatus" class="publish-status">等待操作</p>
      </article>
    </section>
  </main>

  <template id="channelCardTpl">
    <article class="card">
      <div class="card-head">
        <div>
          <p class="card-kicker">Channel</p>
          <h3 class="card-title" data-title></h3>
        </div>
        <span class="state" data-state>加载中</span>
      </div>
      <dl class="meta">
        <dt>版本</dt><dd data-version>--</dd>
        <dt>发布时间</dt><dd data-published>--</dd>
        <dt>最小壳版本</dt><dd data-min-native>--</dd>
        <dt>资源链接</dt><dd><a data-url href="#" target="_blank" rel="noopener">--</a></dd>
        <dt>SHA-256</dt><dd data-hash>--</dd>
        <dt>更新说明</dt><dd data-notes>--</dd>
      </dl>
      <div>
        <p class="card-kicker">最近 3 个版本</p>
        <div class="history" data-history></div>
      </div>
      <div class="actions">
        <button class="btn" type="button" data-open-manifest>打开 manifest</button>
        <button class="btn" type="button" data-open-bundle>打开 bundle</button>
        <button class="btn" type="button" data-refresh>刷新此通道</button>
      </div>
    </article>
  </template>

  <script>
    const channels = ['stable', 'beta']
    const baseUrl = new URL('./', window.location.href)
    const channelGrid = document.getElementById('channelGrid')
    const refreshAllBtn = document.getElementById('refreshAllBtn')
    const updatedAtChip = document.getElementById('updatedAtChip')
    const baseUrlChip = document.getElementById('baseUrlChip')
    const tpl = document.getElementById('channelCardTpl')
    const publishChannel = document.getElementById('publishChannel')
    const publishVersion = document.getElementById('publishVersion')
    const publishMinNative = document.getElementById('publishMinNative')
    const publishNotes = document.getElementById('publishNotes')
    const publishToken = document.getElementById('publishToken')
    const publishBtn = document.getElementById('publishBtn')
    const saveTokenBtn = document.getElementById('saveTokenBtn')
    const copyTokenBtn = document.getElementById('copyTokenBtn')
    const clearTokenBtn = document.getElementById('clearTokenBtn')
    const openActionsBtn = document.getElementById('openActionsBtn')
    const publishStatus = document.getElementById('publishStatus')
    const giteeReleaseTag = document.getElementById('giteeReleaseTag')
    const syncGiteeBtn = document.getElementById('syncGiteeBtn')
    const openSyncGiteeBtn = document.getElementById('openSyncGiteeBtn')
    const syncGiteeReleaseBtn = document.getElementById('syncGiteeReleaseBtn')
    const openSyncGiteeReleaseBtn = document.getElementById('openSyncGiteeReleaseBtn')
    const giteeWorkflowStatus = document.getElementById('giteeWorkflowStatus')
    const announcementGistUrl = document.getElementById('announcementGistUrl')

    function normalizeHttpsUrl(value) {
      const raw = String(value || '').trim()
      if (!raw) return ''
      try {
        const parsed = new URL(raw)
        if (parsed.protocol !== 'https:') return ''
        return parsed.href
      } catch {
        return ''
      }
    }

    function parseGistId(value) {
      const raw = String(value || '').trim()
      if (!raw) return ''

      const direct = raw.match(/^[a-f0-9]{20,}$/i)
      if (direct) return direct[0]

      try {
        const parsed = new URL(raw)
        const host = parsed.hostname.toLowerCase()

        if (host === 'gist.github.com') {
          const segments = parsed.pathname.split('/').filter(Boolean)
          return String(segments[segments.length - 1] || '').trim()
        }

        if (host === 'api.github.com') {
          const match = parsed.pathname.match(/\/gists\/([a-f0-9]+)/i)
          return match?.[1] || ''
        }

        if (host === 'gist.githubusercontent.com') {
          const segments = parsed.pathname.split('/').filter(Boolean)
          return String(segments[1] || '').trim()
        }
      } catch {
        return ''
      }

      return ''
    }

    function buildGitHubHeaders(token) {
      const headers = {
        Accept: 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28',
        'Content-Type': 'application/json'
      }
      if (token) {
        headers.Authorization = `Bearer ${token}`
      }
      return headers
    }

    function pickAnnouncementFile(files) {
      const entries = Object.entries(files || {})
      if (!entries.length) return null

      return entries.find(([name]) => /manifest/i.test(name) && /\.json$/i.test(name))
        || entries.find(([name]) => /\.json$/i.test(name))
        || entries[0]
    }

    function applyAnnouncementToForm(manifest) {
      const list = Array.isArray(manifest?.announcements) ? manifest.announcements : []
      const item = list[0] || {}
      const showRule = item.showRule && typeof item.showRule === 'object' ? item.showRule : {}
      const cta = item.cta && typeof item.cta === 'object' ? item.cta : {}

      announcementId.value = String(item.id || '').trim()
      announcementPriority.value = Number.isFinite(Number(item.priority)) ? String(Number(item.priority)) : '100'
      announcementTitle.value = String(item.title || '').trim()
      announcementMessage.value = String(item.message || '').trim()
      announcementShowMode.value = ['once', 'daily', 'per_version'].includes(String(showRule.showMode || '').trim())
        ? String(showRule.showMode || '').trim()
        : 'once'
      announcementChannels.value = Array.isArray(showRule.channels) && showRule.channels.length
        ? showRule.channels.map((entry) => String(entry || '').trim()).filter(Boolean).join(',')
        : 'stable,beta'
      announcementStartAt.value = String(showRule.startAt || '').trim()
      announcementEndAt.value = String(showRule.endAt || '').trim()
      announcementMinVersion.value = String(showRule.minAppVersion || '').trim()
      announcementMaxVersion.value = String(showRule.maxAppVersion || '').trim()
      announcementCtaText.value = String(cta.text || '').trim()
      announcementCtaUrl.value = String(cta.url || '').trim()
      announcementEnabled.checked = item.enabled !== false
    }

    function buildAnnouncementFromForm() {
      const id = String(announcementId.value || '').trim()
      const title = String(announcementTitle.value || '').trim()
      const message = String(announcementMessage.value || '').trim()

      if (!id) {
        throw new Error('公告 ID 不能为空。')
      }
      if (!title) {
        throw new Error('公告标题不能为空。')
      }
      if (!message) {
        throw new Error('公告正文不能为空。')
      }

      const channels = String(announcementChannels.value || '')
        .split(',')
        .map((entry) => entry.trim().toLowerCase())
        .filter(Boolean)

      const ctaUrl = normalizeHttpsUrl(announcementCtaUrl.value)
      const ctaText = String(announcementCtaText.value || '').trim()

      return {
        id,
        enabled: announcementEnabled.checked,
        priority: Number.isFinite(Number(announcementPriority.value)) ? Number(announcementPriority.value) : 100,
        title,
        message,
        cta: {
          text: ctaText,
          url: ctaUrl,
          action: ctaUrl ? 'open_url' : 'dismiss'
        },
        showRule: {
          showMode: String(announcementShowMode.value || 'once').trim() || 'once',
          startAt: String(announcementStartAt.value || '').trim(),
          endAt: String(announcementEndAt.value || '').trim(),
          minAppVersion: String(announcementMinVersion.value || '').trim(),
          maxAppVersion: String(announcementMaxVersion.value || '').trim(),
          channels: channels.length ? channels : ['stable', 'beta']
        }
      }
    }

    async function requestGist(gistId, token, method = 'GET', body = null) {
      const response = await fetch(`https://api.github.com/gists/${gistId}`, {
        method,
        headers: buildGitHubHeaders(token),
        body: body ? JSON.stringify(body) : null
      })

      if (!response.ok) {
        const detail = await response.text().catch(() => '')
        throw new Error(`Gist 请求失败（${response.status}）${detail ? `：${detail}` : ''}`)
      }

      return response.json()
    }

    async function loadAnnouncementFromGist() {
      const token = String(publishToken.value || '').trim()
      if (!token) {
        setAnnouncementStatus('请先填写 GitHub Token（需要 gist 权限）。', 'error')
        return
      }

      const gistInput = String(announcementGistUrl.value || '').trim()
      const gistId = parseGistId(gistInput)
      if (!gistId) {
        setAnnouncementStatus('请填写有效的 Gist 链接或 Gist ID。', 'error')
        return
      }

      loadAnnouncementBtn.disabled = true
      setAnnouncementStatus('正在读取 Gist 公告配置...', 'default')

      try {
        const gistPayload = await requestGist(gistId, token)
        const picked = pickAnnouncementFile(gistPayload?.files)
        if (!picked) {
          throw new Error('Gist 中未找到可用 JSON 文件。')
        }

        const [fileName, filePayload] = picked
        currentAnnouncementFileName = fileName
        const rawContent = String(filePayload?.content || '').trim()
        if (!rawContent) {
          throw new Error(`文件 ${fileName} 内容为空。`)
        }

        const manifest = JSON.parse(rawContent)
        currentAnnouncementManifest = manifest
        applyAnnouncementToForm(manifest)

        announcementGistUrl.value = `https://gist.github.com/${repoOwner}/${gistId}`
        setAnnouncementStatus(`读取成功：${fileName}。你可以编辑后发布。`, 'ok')
      } catch (error) {
        setAnnouncementStatus(error?.message || '读取公告失败。', 'error')
      } finally {
        loadAnnouncementBtn.disabled = false
      }
    }

    async function publishAnnouncementToGist() {
      const token = String(publishToken.value || '').trim()
      if (!token) {
        setAnnouncementStatus('发布需要 GitHub Token（gist 权限）。', 'error')
        return
      }

      const gistInput = String(announcementGistUrl.value || '').trim()
      const gistId = parseGistId(gistInput)
      if (!gistId) {
        setAnnouncementStatus('请填写有效的 Gist 链接或 Gist ID。', 'error')
        return
      }

      publishAnnouncementBtn.disabled = true
      setAnnouncementStatus('正在发布公告到 Gist...', 'default')

      try {
        const nextAnnouncement = buildAnnouncementFromForm()
        const baseManifest = currentAnnouncementManifest && typeof currentAnnouncementManifest === 'object'
          ? currentAnnouncementManifest
          : {}

        const nextManifest = {
          version: Number.isFinite(Number(baseManifest.version)) ? Number(baseManifest.version) : 1,
          updatedAt: new Date().toISOString(),
          announcements: [nextAnnouncement]
        }

        const fileName = String(currentAnnouncementFileName || 'manifest.json').trim() || 'manifest.json'

        await requestGist(gistId, token, 'PATCH', {
          files: {
            [fileName]: {
              content: JSON.stringify(nextManifest, null, 2)
            }
          }
        })

        currentAnnouncementManifest = nextManifest
        announcementGistUrl.value = `https://gist.github.com/${repoOwner}/${gistId}`
        setAnnouncementStatus(`发布成功：${fileName} 已更新。`, 'ok')
      } catch (error) {
        setAnnouncementStatus(error?.message || '发布公告失败。', 'error')
      } finally {
        publishAnnouncementBtn.disabled = false
      }
    }

    function formatTime(value) {
      if (!value) return '--'
      const date = new Date(value)
      if (Number.isNaN(date.getTime())) return String(value)
      return date.toLocaleString('zh-CN', { hour12: false })
    }

    function statusClass(kind) {
      if (kind === 'ok') return 'state state--ok'
      if (kind === 'warn') return 'state state--warn'
      if (kind === 'error') return 'state state--error'
      return 'state'
    }

    function resolveBundleUrl(manifestUrl, bundleUrl) {
      const raw = String(bundleUrl || '').trim()
      if (!raw) return ''
      try {
        return new URL(raw, manifestUrl).href
      } catch {
        return raw
      }
    }

    async function fetchManifest(channel) {
      const manifestUrl = new URL(`./${channel}/manifest.json`, baseUrl)
      const res = await fetch(manifestUrl.href, { cache: 'no-store' })
      if (!res.ok) throw new Error(`请求失败 ${res.status}`)
      const data = await res.json()
      return { data, manifestUrl: manifestUrl.href }
    }

    async function fetchVersions(channel) {
      const versionsUrl = new URL(`./${channel}/versions.json`, baseUrl)
      const res = await fetch(versionsUrl.href, { cache: 'no-store' })
      if (!res.ok) return []
      const data = await res.json().catch(() => [])
      return Array.isArray(data) ? data.slice(0, 3) : []
    }

    function bindCard(channel) {
      const node = tpl.content.firstElementChild.cloneNode(true)
      node.querySelector('[data-title]').textContent = channel
      channelGrid.appendChild(node)

      const refs = {
        node,
        state: node.querySelector('[data-state]'),
        version: node.querySelector('[data-version]'),
        published: node.querySelector('[data-published]'),
        minNative: node.querySelector('[data-min-native]'),
        url: node.querySelector('[data-url]'),
        hash: node.querySelector('[data-hash]'),
        notes: node.querySelector('[data-notes]'),
        history: node.querySelector('[data-history]'),
        openManifest: node.querySelector('[data-open-manifest]'),
        openBundle: node.querySelector('[data-open-bundle]'),
        refresh: node.querySelector('[data-refresh]')
      }

      refs.refresh.addEventListener('click', () => loadChannel(channel))
      cards.set(channel, refs)
    }

    function renderChannel(channel, payload) {
      const refs = cards.get(channel)
      if (!refs) return

      refs.history.innerHTML = ''

      if (payload.error) {
        refs.state.className = statusClass('error')
        refs.state.textContent = '读取失败'
        refs.version.textContent = '--'
        refs.published.textContent = '--'
        refs.minNative.textContent = '--'
        refs.url.textContent = '--'
        refs.url.href = '#'
        refs.hash.textContent = payload.error
        refs.notes.textContent = '--'
        refs.history.innerHTML = '<div class="history-item">暂无可用历史</div>'
        refs.openBundle.disabled = true
        refs.openManifest.onclick = () => window.open(new URL(`./${channel}/manifest.json`, baseUrl).href, '_blank', 'noopener')
        return
      }

      const { data, manifestUrl, versions } = payload
      const bundleUrl = resolveBundleUrl(manifestUrl, data?.url)
      const hasVersion = Boolean(data?.version)
      const hasBundle = Boolean(bundleUrl)
      const stateType = hasVersion && hasBundle ? 'ok' : 'warn'
      const stateText = hasVersion && hasBundle ? '正常' : '字段缺失'

      refs.state.className = statusClass(stateType)
      refs.state.textContent = stateText
      refs.version.textContent = data?.version || '--'
      refs.published.textContent = formatTime(data?.publishedAt)
      refs.minNative.textContent = data?.minNativeVersion || '--'
      refs.hash.textContent = data?.hash || '--'
      refs.notes.textContent = data?.notes || '--'
      refs.url.textContent = hasBundle ? bundleUrl : '--'
      refs.url.href = hasBundle ? bundleUrl : '#'

      refs.openManifest.disabled = false
      refs.openManifest.onclick = () => window.open(manifestUrl, '_blank', 'noopener')
      refs.openBundle.disabled = !hasBundle
      refs.openBundle.onclick = () => {
        if (!hasBundle) return
        window.open(bundleUrl, '_blank', 'noopener')
      }

      if (!versions.length) {
        refs.history.innerHTML = '<div class="history-item">暂无历史（发布后自动生成）</div>'
        return
      }

      const frag = document.createDocumentFragment()
      versions.forEach((item) => {
        const version = String(item?.version || '').trim()
        const row = document.createElement('div')
        row.className = 'history-item'

        const main = document.createElement('div')
        main.className = 'history-main'
        main.innerHTML = `<span class="history-version">${version || '--'}</span><span class="history-time">${formatTime(item?.publishedAt)}</span>`

        const rollbackBtn = document.createElement('button')
        rollbackBtn.className = 'btn'
        rollbackBtn.type = 'button'
        rollbackBtn.textContent = '回档到此版本'
        rollbackBtn.disabled = !version
        rollbackBtn.addEventListener('click', () => triggerRollback(channel, version))

        row.appendChild(main)
        row.appendChild(rollbackBtn)
        frag.appendChild(row)
      })
      refs.history.appendChild(frag)
    }

    async function loadChannel(channel) {
      const refs = cards.get(channel)
      if (refs) {
        refs.state.className = statusClass('warn')
        refs.state.textContent = '刷新中'
      }

      try {
        const [manifestPayload, versions] = await Promise.all([
          fetchManifest(channel),
          fetchVersions(channel)
        ])
        const payload = { ...manifestPayload, versions }
        renderChannel(channel, payload)
      } catch (error) {
        renderChannel(channel, { error: error?.message || '未知错误' })
      }
    }

    async function loadAllChannels() {
      refreshAllBtn.disabled = true
      try {
        await Promise.all(channels.map((channel) => loadChannel(channel)))
        updatedAtChip.textContent = `最近刷新：${formatTime(new Date().toISOString())}`
      } finally {
        refreshAllBtn.disabled = false
      }
    }

    async function triggerPublish() {
      const token = String(publishToken.value || '').trim()
      if (!token) {
        setPublishStatus('请先填写 GitHub Token（需要 workflow 权限）。', 'error')
        return
      }

      const channel = publishChannel.value
      const bundleVersion = String(publishVersion.value || '').trim()
      const minNativeVersion = String(publishMinNative.value || '').trim()
      const notes = String(publishNotes.value || '').trim()

      const inputs = {
        channel,
        bundle_version: bundleVersion,
        min_native_version: minNativeVersion,
        notes,
        rollback_version: ''
      }

      publishBtn.disabled = true
      setPublishStatus('正在触发发布工作流...', 'default')

      try {
        const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/actions/workflows/${workflowId}/dispatches`, {
          method: 'POST',
          headers: {
            Accept: 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28',
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            ref: 'main',
            inputs
          })
        })

        if (!response.ok) {
          const detail = await response.text().catch(() => '')
          throw new Error(`触发失败（${response.status}）${detail ? `：${detail}` : ''}`)
        }

        setPublishStatus('已触发发布。请在 Actions 页面查看执行进度，完成后可点击“刷新全部”。', 'ok')
      } catch (error) {
        setPublishStatus(error?.message || '触发发布失败。', 'error')
      } finally {
        publishBtn.disabled = false
      }
    }

    async function dispatchWorkflow(targetWorkflowId, inputs = {}) {
      const token = String(publishToken.value || '').trim()
      if (!token) {
        throw new Error('请先填写 GitHub Token（需要 repo/workflow 权限）。')
      }

      const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/actions/workflows/${targetWorkflowId}/dispatches`, {
        method: 'POST',
        headers: {
          Accept: 'application/vnd.github+json',
          'X-GitHub-Api-Version': '2022-11-28',
          Authorization: `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          ref: 'main',
          inputs
        })
      })

      if (!response.ok) {
        const detail = await response.text().catch(() => '')
        throw new Error(`触发失败：${response.status}${detail ? `，${detail}` : ''}`)
      }
    }

    async function triggerRollback(channel, version) {
      const token = String(publishToken.value || '').trim()
      if (!token) {
        setPublishStatus('回档需要先填写 GitHub Token。', 'error')
        return
      }
      if (!version) {
        setPublishStatus('回档版本无效。', 'error')
        return
      }

      publishBtn.disabled = true
      setPublishStatus(`正在回档 ${channel} -> ${version} ...`, 'default')

      try {
        const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/actions/workflows/${workflowId}/dispatches`, {
          method: 'POST',
          headers: {
            Accept: 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28',
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            ref: 'main',
            inputs: {
              channel,
              bundle_version: '',
              min_native_version: '',
              notes: '',
              rollback_version: version
            }
          })
        })

        if (!response.ok) {
          const detail = await response.text().catch(() => '')
          throw new Error(`回档触发失败（${response.status}）${detail ? `：${detail}` : ''}`)
        }

        setPublishStatus(`已触发回档：${channel} -> ${version}。请到 Actions 查看进度。`, 'ok')
      } catch (error) {
        setPublishStatus(error?.message || '回档触发失败。', 'error')
      } finally {
        publishBtn.disabled = false
      }
    }

    function openActionsPage() {
      const url = `https://github.com/${repoOwner}/${repoName}/actions/workflows/${workflowId}`
      window.open(url, '_blank', 'noopener')
    }

    async function triggerSyncGiteeRelease() {
      const tag = String(giteeReleaseTag.value || '').trim()
      if (!tag) {
        setGiteeWorkflowStatus('请先填写 Release Tag。', 'error')
        return
      }

      syncGiteeReleaseBtn.disabled = true
      setGiteeWorkflowStatus(`正在触发 sync-gitee-release workflow（${tag}）...`, 'default')

      try {
        await dispatchWorkflow(syncGiteeReleaseWorkflowId, { tag })
        setGiteeWorkflowStatus(`已触发 Release 同步：${tag}。请到 Actions 页面查看进度。`, 'ok')
      } catch (error) {
        setGiteeWorkflowStatus(error?.message || '触发 Release 同步失败。', 'error')
      } finally {
        syncGiteeReleaseBtn.disabled = false
      }
    }

    function openWorkflowPageById(targetWorkflowId) {
      const url = `https://github.com/${repoOwner}/${repoName}/actions/workflows/${targetWorkflowId}`
      window.open(url, '_blank', 'noopener')
    }

    function setupQuickNav() {
      if (!quickNavButtons.length && !quickNavMobileButtons.length) return

      const sectionById = new Map()
      const allNavButtons = [...quickNavButtons, ...quickNavMobileButtons]

      allNavButtons.forEach((btn) => {
        const targetId = String(btn.dataset.navTarget || btn.dataset.navTargetMobile || '').trim()
        const section = document.getElementById(targetId)
        if (!section) return
        sectionById.set(targetId, section)
      })

      if (!sectionById.size) return

      function focusSection(targetId) {
        sectionById.forEach((section, id) => {
          section.classList.toggle('section--collapsed', id !== targetId)
        })

        allNavButtons.forEach((btn) => {
          const currentTargetId = String(btn.dataset.navTarget || btn.dataset.navTargetMobile || '').trim()
          btn.classList.toggle('active', currentTargetId === targetId)
        })

        const section = sectionById.get(targetId)
        if (section) {
          section.scrollIntoView({ behavior: 'smooth', block: 'start' })
        }
      }

      function showAllSections() {
        sectionById.forEach((section) => {
          section.classList.remove('section--collapsed')
        })

        allNavButtons.forEach((btn) => {
          btn.classList.remove('active')
        })
      }

      allNavButtons.forEach((btn) => {
        const targetId = String(btn.dataset.navTarget || '').trim()
        const mobileTargetId = String(btn.dataset.navTargetMobile || '').trim()
        const sectionId = targetId || mobileTargetId
        if (!sectionId) return

        btn.addEventListener('click', () => {
          focusSection(sectionId)
        })
      })

      const refreshActiveState = () => {
        const hasCollapsedSection = Array.from(sectionById.values()).some((section) => section.classList.contains('section--collapsed'))
        if (hasCollapsedSection) return

        let activeId = ''
        let nearestOffset = Number.POSITIVE_INFINITY

        sectionById.forEach((section, id) => {
          const rect = section.getBoundingClientRect()
          const offset = Math.abs(rect.top - 120)
          if (rect.bottom > 120 && offset < nearestOffset) {
            nearestOffset = offset
            activeId = id
          }
        })

        allNavButtons.forEach((btn) => {
          const targetId = String(btn.dataset.navTarget || btn.dataset.navTargetMobile || '').trim()
          btn.classList.toggle('active', targetId === activeId)
        })
      }

      window.addEventListener('scroll', refreshActiveState, { passive: true })

      if (showAllSectionsBtn) {
        showAllSectionsBtn.addEventListener('click', showAllSections)
      }
      if (showAllSectionsMobileBtn) {
        showAllSectionsMobileBtn.addEventListener('click', showAllSections)
      }

      refreshActiveState()
    }

    channels.forEach(bindCard)
    restoreTokenFromLocalStorage()
    announcementGistUrl.value = defaultAnnouncementGistUrl
    refreshAllBtn.addEventListener('click', loadAllChannels)
    publishBtn.addEventListener('click', triggerPublish)
    saveTokenBtn.addEventListener('click', saveTokenToLocalStorage)
    copyTokenBtn.addEventListener('click', copyTokenToClipboard)
    clearTokenBtn.addEventListener('click', clearTokenStorageAndInput)
    openActionsBtn.addEventListener('click', openActionsPage)
    loadAnnouncementBtn.addEventListener('click', loadAnnouncementFromGist)
    publishAnnouncementBtn.addEventListener('click', publishAnnouncementToGist)
    openAnnouncementGistBtn.addEventListener('click', openAnnouncementGistPage)
    syncGiteeBtn.addEventListener('click', triggerSyncGitee)
    syncGiteeReleaseBtn.addEventListener('click', triggerSyncGiteeRelease)
    openSyncGiteeBtn.addEventListener('click', () => openWorkflowPageById(syncGiteeWorkflowId))
    openSyncGiteeReleaseBtn.addEventListener('click', () => openWorkflowPageById(syncGiteeReleaseWorkflowId))
    setupQuickNav()
    loadAllChannels()
  </script>
</body>
</html>
